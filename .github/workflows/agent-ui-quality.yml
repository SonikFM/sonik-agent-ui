name: Agent UI Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-ui-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Types, tests, build, and deterministic smokes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm check-types

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Embedded Agent UI smoke
        run: pnpm smoke:agent-ui:embed

      - name: Wait for embedded smoke server teardown
        shell: bash
        run: |
          for _ in {1..20}; do
            if ! curl --fail --silent http://localhost:5173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Embedded smoke dev server did not stop"
          exit 1

      - name: Run persistence and reattach smoke
        run: pnpm smoke:agent-ui:run-reattach

      - name: Upload smoke evidence on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent-ui-smoke-evidence-${{ github.run_id }}
          path: .omx/logs/
          if-no-files-found: ignore
          retention-days: 7
