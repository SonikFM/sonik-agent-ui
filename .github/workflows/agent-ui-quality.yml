name: Agent UI Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-ui-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Types, tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Design gate — metrics (workflow-builder)
        run: python3 scripts/design-gates/check-design-metrics.py apps/standalone-sveltekit/src/lib/components/workflow-builder/

      - name: Design gate — enterprise UX (workflow-builder)
        run: python3 scripts/design-gates/check-enterprise-ux.py apps/standalone-sveltekit/src/lib/components/workflow-builder/

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check diff hygiene
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "$BASE_SHA...HEAD"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^..HEAD
          else
            git diff --check
          fi

      - name: Build observability contracts
        run: pnpm --filter @sonik-agent-ui/agent-observability build

      - name: Build workflow tool contracts
        run: pnpm --filter @sonik-agent-ui/tool-contracts build

      - name: Check generated commands and committed source integrity
        run: pnpm check:commands

      - name: Verify PostgreSQL migration plan
        run: pnpm db:migrate:dry-run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable

      - name: Test PostgreSQL migration dry run
        run: pnpm test:postgres-migration-dry-run
        env:
          POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable

      - name: Typecheck
        run: pnpm check-types

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

  smoke:
    name: Embedded Agent UI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke
        run: pnpm smoke:agent-ui:embed

      - name: Upload smoke evidence on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent-ui-smoke-evidence-${{ github.run_id }}
          path: .omx/logs/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.1.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: pnpm test:e2e

      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
