<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fake Booking Host · Sonik Agent UI Embed</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: #f6f2e8; color: #171717; }
      .shell { display: grid; grid-template-columns: minmax(18rem, 23rem) 1fr; min-height: 100vh; }
      aside { border-right: 1px solid rgba(0,0,0,.12); padding: 1rem; background: #fbf8ef; }
      main { min-height: 100vh; }
      iframe { width: 100%; height: 100vh; border: 0; display: block; background: white; }
      .eyebrow { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: #6a5d48; font-weight: 800; }
      .card { border: 1px solid rgba(0,0,0,.12); border-radius: 1rem; padding: 1rem; background: white; box-shadow: 0 10px 30px rgba(0,0,0,.06); margin-top: 1rem; }
      code { background: #f1eadc; border-radius: .4rem; padding: .1rem .3rem; }
      button { border: 1px solid rgba(0,0,0,.18); border-radius: .75rem; padding: .7rem .9rem; background: #222; color: white; font-weight: 700; cursor: pointer; }
      dl { display: grid; gap: .6rem; }
      dt { color: #6a5d48; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; font-weight: 800; }
      dd { margin: 0; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <div class="eyebrow">Fake host harness</div>
        <h1>Booking detail host</h1>
        <p>This page embeds the standalone Agent UI through an iframe and donates sanitized booking page context over postMessage.</p>
        <div class="card">
          <dl>
            <div><dt>Surface</dt><dd>booking-console</dd></div>
            <div><dt>Page type</dt><dd>event-booking-detail</dd></div>
            <div><dt>Entity</dt><dd>Summer Jazz Night · booking_123</dd></div>
            <div><dt>Families</dt><dd><code>booking</code> <code>event</code></dd></div>
          </dl>
          <button id="resend" type="button">Resend page context</button>
        </div>
      </aside>
      <main>
        <iframe id="agent-frame" title="Sonik Agent UI embedded workspace"></iframe>
      </main>
    </div>
    <script type="module">
      const SONIK_AGENT_UI_HOST_MESSAGE_SOURCE = "sonik-agent-ui-host";
      const SONIK_AGENT_UI_PAGE_CONTEXT_MESSAGE = "sonik:agent-ui:page-context";
      const url = new URL(window.location.href);
      const iframe = document.getElementById("agent-frame");
      const frameParams = new URLSearchParams();
      frameParams.set("agentUiHostOrigin", window.location.origin);
      frameParams.set("theme", url.searchParams.get("theme") ?? "system");
      if (url.searchParams.get("smokeMockStream") !== "0") frameParams.set("smokeMockStream", url.searchParams.get("smokeMockStream") ?? "1");
      frameParams.set("smokeRunId", url.searchParams.get("smokeRunId") ?? `fake-booking-host-${Date.now()}`);
      iframe.src = `/?${frameParams.toString()}`;

      const payload = {
        route: "/booking/bookings/booking_123",
        surface: "booking-console",
        pageType: "event-booking-detail",
        title: "Summer Jazz Night booking",
        activeEntity: { type: "booking", id: "booking_123", label: "Summer Jazz Night" },
        commandFamilies: ["booking", "event"],
        skillFamilies: ["booking-ops"],
        visibleActions: ["viewBooking", "listResources", "assignResource"],
        at: new Date().toISOString(),
      };

      function postContext() {
        iframe.contentWindow?.postMessage({
          source: SONIK_AGENT_UI_HOST_MESSAGE_SOURCE,
          type: SONIK_AGENT_UI_PAGE_CONTEXT_MESSAGE,
          payload: { ...payload, at: new Date().toISOString() },
          sentAt: new Date().toISOString(),
        }, window.location.origin);
      }

      iframe.addEventListener("load", () => setTimeout(postContext, 250));
      document.getElementById("resend").addEventListener("click", postContext);
    </script>
  </body>
</html>
